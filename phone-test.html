<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rotary Phone Spinner — Final Test</title>
  <style>
    :root { --lime: #C1FF72; --dark: #1F2A2E; }
    body { background: var(--dark); font-family: 'Segoe UI', system-ui, sans-serif; color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    h1 { font-size:24px; margin-bottom:8px; }
    p.sub { color:rgba(255,255,255,0.4); margin-bottom:40px; font-size:15px; }

    .phone-wrap { position:relative; width:460px; height:460px; user-select:none; }

    /* Static frame (outer ring + finger stop) */
    .phone-frame { position:absolute; inset:0; z-index:3; pointer-events:none; }
    .phone-frame img { width:100%; height:100%; object-fit:contain; }

    /* Spinning disc */
    .phone-disc { position:absolute; inset:20px; z-index:2; cursor:grab; }
    .phone-disc.grabbing { cursor:grabbing; }
    .phone-disc img { width:100%; height:100%; object-fit:contain; }

    /* Center logo (static, on top) */
    .phone-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:90px; height:90px; z-index:4; pointer-events:none; }
    .phone-center img { width:100%; height:100%; object-fit:contain; }

    /* Info panel */
    .phone-info { text-align:center; margin-top:30px; min-height:70px; }
    .phone-info h3 { color:var(--lime); margin:0 0 6px; font-size:22px; transition:opacity .3s; }
    .phone-info p { color:rgba(255,255,255,0.5); margin:0; font-size:15px; max-width:400px; transition:opacity .3s; }

    /* Hover zones (invisible, on top of disc) */
    .hover-zone { position:absolute; width:70px; height:70px; border-radius:50%; z-index:5; cursor:pointer; transform:translate(-50%,-50%); }
    .hover-zone:hover { background:rgba(193,255,114,0.15); box-shadow:0 0 25px rgba(193,255,114,0.3); }
  </style>
</head>
<body>
  <h1>Cuphead Rotary Phone — Spin & Hover</h1>
  <p class="sub">Grab the dial and spin it. Hover over a character for details.</p>

  <div class="phone-wrap" id="phoneWrap">
    <!-- Layer 1: Static outer frame -->
    <div class="phone-frame">
      <img src="/assets/images/ai-marketing-bureau/phone-frame-extracted.png" alt="Phone frame">
    </div>

    <!-- Layer 2: Spinning dial disc -->
    <div class="phone-disc" id="phoneDisc">
      <img src="/assets/images/ai-marketing-bureau/phone-disc-extracted.png" alt="Rotary dial" draggable="false">
    </div>

    <!-- Layer 3: Center logo (static) -->
    <div class="phone-center">
      <img src="/assets/images/logos/logo-badge2.webp" alt="STUDIOLEE">
    </div>

    <!-- Hover zones (positioned over each hole, rotate with disc via JS) -->
    <div class="hover-zone" id="hz0" data-tool="chatgpt"></div>
    <div class="hover-zone" id="hz1" data-tool="claude"></div>
    <div class="hover-zone" id="hz2" data-tool="n8n"></div>
    <div class="hover-zone" id="hz3" data-tool="ahrefs"></div>
    <div class="hover-zone" id="hz4" data-tool="vapi"></div>
    <div class="hover-zone" id="hz5" data-tool="highlevel"></div>
  </div>

  <div class="phone-info" id="phoneInfo">
    <h3>Draai het wiel</h3>
    <p>Hover over een karakter voor meer informatie</p>
  </div>

  <script>
  (function(){
    var toolData = {
      chatgpt: {title:'ChatGPT', desc:'Strategie, contentcreatie en klantcommunicatie. Van SEO-artikelen tot campagne-ideeën.'},
      claude: {title:'Claude', desc:'Code, automatisering en complete AI-systemen bouwen. Workflows en integraties.'},
      n8n: {title:'N8N Workflows', desc:'Custom automatiseringen voor marketing, administratie en klantopvolging.'},
      ahrefs: {title:'Ahrefs', desc:'Keyword research, backlink-analyse, content gaps en technische SEO-audits.'},
      vapi: {title:'Voice AI', desc:'AI telefonist die 24/7 opneemt, afspraken plant en WhatsApp-samenvattingen stuurt.'},
      highlevel: {title:'HighLevel CRM', desc:'Alles-in-één: klantbeheer, e-mail, social planner, facturatie en rapportage.'}
    };

    var disc = document.getElementById('phoneDisc');
    var wrap = document.getElementById('phoneWrap');
    var info = document.getElementById('phoneInfo');
    var angle = 0, dragging = false, startAngle = 0, startMouse = 0;
    var velocity = 0, lastAngle = 0, raf = null;

    // Hole positions (angles from top, clockwise) — match the generated image
    // The image has holes at roughly: 0°(top), 60°, 120°, 180°, 240°, 300°
    var holes = [
      {angle: -90, tool: 'chatgpt'},   // top
      {angle: -30, tool: 'claude'},     // top-right
      {angle: 30,  tool: 'n8n'},        // bottom-right
      {angle: 90,  tool: 'ahrefs'},     // bottom
      {angle: 150, tool: 'vapi'},       // bottom-left
      {angle: 210, tool: 'highlevel'},  // top-left
    ];
    var radius = 155; // distance from center to hole center
    var cx = 230, cy = 230; // center of the phone-wrap

    function updateHoverZones() {
      holes.forEach(function(h, i) {
        var hz = document.getElementById('hz' + i);
        if (!hz) return;
        var rad = (h.angle + angle) * Math.PI / 180;
        var x = cx + radius * Math.cos(rad);
        var y = cy + radius * Math.sin(rad);
        hz.style.left = x + 'px';
        hz.style.top = y + 'px';
      });
    }

    function getMouseAngle(e) {
      var rect = wrap.getBoundingClientRect();
      var x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left - cx;
      var y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top - cy;
      return Math.atan2(y, x) * 180 / Math.PI;
    }

    function onDown(e) {
      dragging = true;
      disc.classList.add('grabbing');
      startMouse = getMouseAngle(e);
      startAngle = angle;
      velocity = 0;
      if (raf) cancelAnimationFrame(raf);
      e.preventDefault();
    }
    function onMove(e) {
      if (!dragging) return;
      var mouse = getMouseAngle(e);
      angle = startAngle + (mouse - startMouse);
      velocity = angle - lastAngle;
      lastAngle = angle;
      disc.style.transform = 'rotate(' + angle + 'deg)';
      updateHoverZones();
      e.preventDefault();
    }
    function onUp() {
      if (!dragging) return;
      dragging = false;
      disc.classList.remove('grabbing');
      function coast() {
        if (Math.abs(velocity) < 0.05) { startAutoSpin(); return; }
        velocity *= 0.97;
        angle += velocity;
        disc.style.transform = 'rotate(' + angle + 'deg)';
        updateHoverZones();
        raf = requestAnimationFrame(coast);
      }
      coast();
    }

    disc.addEventListener('mousedown', onDown);
    disc.addEventListener('touchstart', onDown, {passive:false});
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove, {passive:false});
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchend', onUp);

    // Auto-spin
    var autoInterval;
    function startAutoSpin() {
      if (autoInterval) return;
      autoInterval = setInterval(function() {
        if (dragging) return;
        angle += 0.12;
        disc.style.transform = 'rotate(' + angle + 'deg)';
        updateHoverZones();
      }, 16);
    }
    function stopAutoSpin() {
      clearInterval(autoInterval);
      autoInterval = null;
    }

    // Hover info
    document.querySelectorAll('.hover-zone').forEach(function(hz) {
      hz.addEventListener('mouseenter', function() {
        stopAutoSpin();
        var t = hz.getAttribute('data-tool');
        var d = toolData[t];
        if (d) {
          info.querySelector('h3').textContent = d.title;
          info.querySelector('p').textContent = d.desc;
        }
      });
      hz.addEventListener('mouseleave', function() {
        info.querySelector('h3').textContent = 'Draai het wiel';
        info.querySelector('p').textContent = 'Hover over een karakter voor meer informatie';
        startAutoSpin();
      });
    });

    // Init
    updateHoverZones();
    startAutoSpin();
  })();
  </script>
</body>
</html>
