<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rotary Phone — Real Stickers</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    :root { --lime: #C1FF72; --dark: #1F2A2E; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--dark); font-family:'Segoe UI',system-ui,sans-serif; color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:40px 20px; }
    h2 { font-size:24px; margin-bottom:6px; }
    .sub { color:rgba(255,255,255,0.4); margin-bottom:40px; font-size:14px; }

    .phone-container { position:relative; width:480px; height:520px; }

    /* L1: Phone body */
    .l-body { position:absolute; inset:0; z-index:1; }
    .l-body img { width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 12px 40px rgba(0,0,0,0.6)); }

    /* L2: Cream disc + stickers (STATIC) — pure CSS circle */
    .l-numplate { position:absolute; width:260px; height:260px; top:50%; left:49%; transform:translate(-50%,-50%); z-index:2; }
    .numplate-bg { position:absolute; inset:0; background:radial-gradient(circle, #f5f0e0 0%, #ebe5d0 80%, #ddd5c0 100%); border-radius:50%; border:2px solid #c0b898; box-shadow:inset 0 2px 8px rgba(0,0,0,0.15); }
    
    /* Stickers positioned in a circle on the cream disc */
    .sticker { position:absolute; width:52px; height:52px; transform:translate(-50%,-50%); pointer-events:none; }
    .sticker img { width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }

    /* L3: Brass finger plate (SPINS) */
    .l-finger { position:absolute; width:275px; height:275px; top:50%; left:49%; transform:translate(-50%,-50%); z-index:3; cursor:grab; user-select:none; }
    .l-finger.grabbing { cursor:grabbing; }
    .l-finger img { width:100%; height:100%; object-fit:contain; }

    /* L4: Center hub */
    .l-hub { position:absolute; top:50%; left:49%; transform:translate(-50%,-50%); z-index:4; pointer-events:none;
      width:68px; height:68px;
      background:radial-gradient(circle, #2a3a3e 0%, var(--dark) 70%);
      border-radius:50%; border:3px solid #8B7355;
      box-shadow:0 0 0 2px rgba(139,115,85,0.3), inset 0 2px 8px rgba(0,0,0,0.4), 0 4px 20px rgba(0,0,0,0.4);
      display:flex; align-items:center; justify-content:center;
    }
    .l-hub img { width:42px; height:42px; object-fit:contain; }

    /* Hover zones */
    a.rz { position:absolute; width:52px; height:52px; border-radius:50%; z-index:5; transform:translate(-50%,-50%);
      transition:box-shadow .2s, background .2s; text-decoration:none; display:block; }
    a.rz:hover { box-shadow:0 0 30px rgba(193,255,114,0.5); background:rgba(193,255,114,0.15); }

    .game-info { text-align:center; margin-top:24px; min-height:70px; z-index:10; }
    .game-box { display:inline-block; background:rgba(0,0,0,0.5); border:2px solid rgba(193,255,114,0.25); border-radius:12px; padding:14px 24px; min-width:300px; }
    .game-title { font-family:'Press Start 2P',monospace; font-size:11px; color:var(--lime); margin-bottom:6px; min-height:16px; }
    .game-desc { color:rgba(255,255,255,0.5); font-size:14px; min-height:18px; }
    .game-title .cur { display:inline-block; width:7px; height:13px; background:var(--lime); animation:blink .6s step-end infinite; vertical-align:middle; margin-left:2px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>
  <h2>Rotary Phone — Real Stickers</h2>
  <p class="sub">Your actual Cuphead stickers on a cream disc, brass plate spins on top</p>

  <div class="phone-container" id="wrap">
    <div class="l-body"><img src="/assets/images/ai-marketing-bureau/phone-body.png" alt=""></div>
    
    <!-- L2: Cream number plate with real stickers -->
    <div class="l-numplate">
      <div class="numplate-bg"></div>
      <!-- 6 stickers positioned in a circle. Center of disc = 130,130. Radius ~90px -->
      <div class="sticker" style="left:50%;top:12%"><img src="/assets/images/stickers/world.webp" alt="SEO"></div>
      <div class="sticker" style="left:83%;top:30%"><img src="/assets/images/stickers/hourglass.webp" alt="Chatbot"></div>
      <div class="sticker" style="left:83%;top:70%"><img src="/assets/images/stickers/draaitafel.webp" alt="Voice AI"></div>
      <div class="sticker" style="left:50%;top:88%"><img src="/assets/images/stickers/gear.webp" alt="Automatisering"></div>
      <div class="sticker" style="left:17%;top:70%"><img src="/assets/images/stickers/washing.webp" alt="Website"></div>
      <div class="sticker" style="left:17%;top:30%"><img src="/assets/images/stickers/ferris.webp" alt="Tarieven"></div>
    </div>

    <div class="l-finger" id="plate"><img src="/assets/images/ai-marketing-bureau/plate-final.png" alt="" draggable="false"></div>
    <div class="l-hub"><img src="/assets/images/logos/logo-badge2.webp" alt="STUDIOLEE"></div>

    <!-- Hover zones matching sticker positions -->
    <a class="rz" href="/seo" data-t="seo" style="left:49%;top:28%"></a>
    <a class="rz" href="/chatbot" data-t="chatbot" style="left:65%;top:36%"></a>
    <a class="rz" href="/voice-ai" data-t="voice" style="left:65%;top:57%"></a>
    <a class="rz" href="/automations" data-t="auto" style="left:49%;top:65%"></a>
    <a class="rz" href="/website-laten-maken" data-t="website" style="left:33%;top:57%"></a>
    <a class="rz" href="/tarieven" data-t="tarieven" style="left:33%;top:36%"></a>
  </div>

  <div class="game-info">
    <div class="game-box">
      <div class="game-title" id="gT">KIES EEN DIENST<span class="cur"></span></div>
      <div class="game-desc" id="gD">Draai de schijf en klik op een karakter</div>
    </div>
  </div>

  <script>
  (function(){
    var d={
      seo:      {t:'SEO & VINDBAARHEID',   d:'Gevonden worden op Google en in ChatGPT'},
      chatbot:  {t:'AI CHATBOT',           d:'24/7 leadopvang op je website'},
      voice:    {t:'VOICE AI',             d:'AI telefonist die elk gesprek opneemt'},
      auto:     {t:'AUTOMATISERING',       d:'N8N workflows en AI-systemen'},
      website:  {t:'WEBSITE LATEN MAKEN',  d:'SEO-geoptimaliseerd, live in 2 weken'},
      tarieven: {t:'TARIEVEN',             d:'Transparante prijzen vanaf \u20ac79/mo'}
    };

    var plate=document.getElementById('plate'), wrap=document.getElementById('wrap');
    var a=0,drag=false,sA=0,sM=0,v=0,lA=0,raf;

    function ma(e){var r=wrap.getBoundingClientRect();var x=(e.touches?e.touches[0].clientX:e.clientX)-r.left-480*.49;var y=(e.touches?e.touches[0].clientY:e.clientY)-r.top-520*.50;return Math.atan2(y,x)*180/Math.PI;}
    function dn(e){if(e.target.closest('.rz'))return;drag=true;plate.classList.add('grabbing');sM=ma(e);sA=a;v=0;if(raf)cancelAnimationFrame(raf);stopA();e.preventDefault();}
    function mv(e){if(!drag)return;var m=ma(e);a=sA+(m-sM);v=a-lA;lA=a;plate.style.transform='translate(-50%,-50%) rotate('+a+'deg)';e.preventDefault();}
    function up(){if(!drag)return;drag=false;plate.classList.remove('grabbing');function c(){if(Math.abs(v)<.05){startA();return;}v*=.97;a+=v;plate.style.transform='translate(-50%,-50%) rotate('+a+'deg)';raf=requestAnimationFrame(c);}c();}

    plate.addEventListener('mousedown',dn);plate.addEventListener('touchstart',dn,{passive:false});
    window.addEventListener('mousemove',mv);window.addEventListener('touchmove',mv,{passive:false});
    window.addEventListener('mouseup',up);window.addEventListener('touchend',up);

    var ai;function startA(){if(ai)return;ai=setInterval(function(){if(drag)return;a+=.15;plate.style.transform='translate(-50%,-50%) rotate('+a+'deg)';},16);}
    function stopA(){clearInterval(ai);ai=null;}

    var tt;function tw(el,txt){if(tt)clearInterval(tt);el.innerHTML='';var i=0;tt=setInterval(function(){if(i<txt.length){el.innerHTML=txt.substring(0,i+1)+'<span class="cur"></span>';i++;}else{clearInterval(tt);tt=null;}},40);}

    document.querySelectorAll('.rz').forEach(function(z){
      z.addEventListener('mouseenter',function(){stopA();var t=d[z.dataset.t];if(t){tw(document.getElementById('gT'),t.t);document.getElementById('gD').textContent=t.d;}});
      z.addEventListener('mouseleave',function(){tw(document.getElementById('gT'),'KIES EEN DIENST');document.getElementById('gD').textContent='Draai de schijf en klik op een karakter';startA();});
    });
    startA();
  })();
  </script>
</body>
</html>
