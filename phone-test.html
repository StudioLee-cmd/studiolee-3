<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rotary Phone — Final Test</title>
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@1.0.8/dist/iconify-icon.min.js"></script>
  <style>
    :root { --lime: #C1FF72; --dark: #1F2A2E; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--dark); font-family:'Segoe UI',system-ui,sans-serif; color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:40px 20px; }
    h2 { font-size:28px; margin-bottom:6px; }
    .sub { color:rgba(255,255,255,0.4); margin-bottom:40px; }

    /* Phone container — body image as background */
    .phone-container { position:relative; width:500px; height:500px; }
    .phone-body { position:absolute; inset:-40px; z-index:1; }
    .phone-body img { width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 12px 40px rgba(0,0,0,0.6)); }

    /* Rotary area sits on top of the phone body, centered on the dial hole */
    .rotary { position:absolute; width:320px; height:320px; top:50%; left:50%; transform:translate(-50%,-46%); z-index:2; user-select:none; }

    .rotary-frame { position:absolute; inset:-12px; z-index:3; pointer-events:none; }
    .rotary-frame img { width:100%; height:100%; object-fit:contain; }

    .rotary-disc { position:absolute; inset:0; z-index:2; cursor:grab; }
    .rotary-disc.grabbing { cursor:grabbing; }
    .rotary-disc img { width:100%; height:100%; object-fit:contain; }

    .rotary-hub { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:78px; height:78px; z-index:4; pointer-events:none;
      background:radial-gradient(circle, #2a3a3e 0%, var(--dark) 70%);
      border-radius:50%;
      border:3px solid #8B7355;
      box-shadow: 0 0 0 2px rgba(139,115,85,0.3), inset 0 2px 8px rgba(0,0,0,0.4), 0 4px 20px rgba(0,0,0,0.4);
      display:flex; align-items:center; justify-content:center;
    }
    .rotary-hub img { width:48px; height:48px; object-fit:contain; }

    .rotary-info { text-align:center; margin-top:40px; min-height:70px; position:relative; z-index:10; }
    .rotary-info h3 { color:var(--lime); font-size:22px; margin-bottom:6px; }
    .rotary-info p { color:rgba(255,255,255,0.5); font-size:15px; max-width:380px; margin:0 auto; }

    a.rz { position:absolute; width:55px; height:55px; border-radius:50%; z-index:5; transform:translate(-50%,-50%);
      transition:box-shadow .2s, background .2s; text-decoration:none; display:block; }
    a.rz:hover { box-shadow:0 0 25px rgba(193,255,114,0.5); background:rgba(193,255,114,0.12); }
  </style>
</head>
<body>
  <h2>De AI-tools achter jouw groei</h2>
  <p class="sub">Draai het wiel. Hover voor details. Klik om meer te lezen.</p>

  <div class="phone-container">
    <!-- Phone body background -->
    <div class="phone-body">
      <img src="/assets/images/ai-marketing-bureau/phone-body.png" alt="1930s rotary telephone">
    </div>

    <!-- Spinning dial on top -->
    <div class="rotary" id="rotary">
      <div class="rotary-frame">
        <img src="/assets/images/ai-marketing-bureau/frame-clean.png" alt="">
      </div>
      <div class="rotary-disc" id="disc">
        <img src="/assets/images/ai-marketing-bureau/disc-clean.png" alt="AI tools dial" draggable="false">
      </div>
      <div class="rotary-hub">
        <img src="/assets/images/logos/logo-badge2.webp" alt="STUDIOLEE">
      </div>

      <a class="rz" id="rz0" href="/seo" data-tool="chatgpt"></a>
      <a class="rz" id="rz1" href="/automations" data-tool="claude"></a>
      <a class="rz" id="rz2" href="/automations" data-tool="n8n"></a>
      <a class="rz" id="rz3" href="/seo" data-tool="ahrefs"></a>
      <a class="rz" id="rz4" href="/voice-ai" data-tool="vapi"></a>
      <a class="rz" id="rz5" href="/dashboard" data-tool="highlevel"></a>
    </div>
  </div>

  <div class="rotary-info" id="info">
    <h3>Draai het wiel</h3>
    <p>Hover over een karakter voor meer informatie</p>
  </div>

  <script>
  (function(){
    var tools = {
      chatgpt: {t:'ChatGPT', d:'Strategie, contentcreatie en klantcommunicatie. Van SEO-artikelen tot campagne-ideeën op schaal.'},
      claude: {t:'Claude', d:'Code, automatisering en complete AI-systemen bouwen. Workflows en integraties vanaf scratch.'},
      n8n: {t:'N8N Workflows', d:'Custom automatiseringen voor marketing, administratie en klantopvolging. Draait 24/7.'},
      ahrefs: {t:'Ahrefs', d:'Keyword research, backlink-analyse, content gaps en technische SEO-audits op professioneel niveau.'},
      vapi: {t:'Voice AI', d:'AI telefonist die 24/7 opneemt, afspraken plant en WhatsApp-samenvattingen stuurt.'},
      highlevel: {t:'HighLevel CRM', d:'Alles-in-één: klantbeheer, e-mail, social planner, facturatie en rapportage.'}
    };

    var disc = document.getElementById('disc');
    var wrap = document.getElementById('rotary');
    var angle = 0, dragging = false, startA = 0, startM = 0, vel = 0, lastA = 0, raf;
    var hasDragged = false;
    var size = 320, center = size/2, radius = 113;

    var holes = [
      {a:-90, tool:'chatgpt'},
      {a:-30, tool:'claude'},
      {a:30,  tool:'n8n'},
      {a:90,  tool:'ahrefs'},
      {a:150, tool:'vapi'},
      {a:210, tool:'highlevel'}
    ];

    function updateZones() {
      holes.forEach(function(h, i) {
        var hz = document.getElementById('rz'+i);
        var rad = (h.a + angle) * Math.PI / 180;
        hz.style.left = (center + radius * Math.cos(rad)) + 'px';
        hz.style.top = (center + radius * Math.sin(rad)) + 'px';
      });
    }

    function mouseAngle(e) {
      var r = wrap.getBoundingClientRect();
      var x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left - center;
      var y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top - center;
      return Math.atan2(y, x) * 180 / Math.PI;
    }

    function down(e) {
      if (e.target.closest('.rz')) return;
      dragging=true; hasDragged=false;
      disc.classList.add('grabbing');
      startM=mouseAngle(e); startA=angle; vel=0;
      if(raf)cancelAnimationFrame(raf); stopAuto();
      e.preventDefault();
    }
    function move(e) {
      if(!dragging)return;
      var m=mouseAngle(e);
      if(Math.abs(m-startM)>2) hasDragged=true;
      angle=startA+(m-startM);
      vel=angle-lastA; lastA=angle;
      disc.style.transform='rotate('+angle+'deg)';
      updateZones(); e.preventDefault();
    }
    function up() {
      if(!dragging)return; dragging=false;
      disc.classList.remove('grabbing');
      function coast(){if(Math.abs(vel)<0.05){startAuto();return;} vel*=0.97; angle+=vel; disc.style.transform='rotate('+angle+'deg)'; updateZones(); raf=requestAnimationFrame(coast);}
      coast();
    }

    document.querySelectorAll('.rz').forEach(function(z){
      z.addEventListener('click', function(e){ if(hasDragged){e.preventDefault();hasDragged=false;} });
    });

    disc.addEventListener('mousedown',down);
    disc.addEventListener('touchstart',down,{passive:false});
    window.addEventListener('mousemove',move);
    window.addEventListener('touchmove',move,{passive:false});
    window.addEventListener('mouseup',up);
    window.addEventListener('touchend',up);

    var autoId;
    function startAuto(){if(autoId)return; autoId=setInterval(function(){if(dragging)return; angle+=0.15; disc.style.transform='rotate('+angle+'deg)'; updateZones();},16);}
    function stopAuto(){clearInterval(autoId);autoId=null;}

    document.querySelectorAll('.rz').forEach(function(z){
      z.addEventListener('mouseenter',function(){ stopAuto(); var d=tools[z.dataset.tool]; if(d){document.querySelector('#info h3').textContent=d.t; document.querySelector('#info p').textContent=d.d;} });
      z.addEventListener('mouseleave',function(){ document.querySelector('#info h3').textContent='Draai het wiel'; document.querySelector('#info p').textContent='Hover over een karakter voor meer informatie'; startAuto(); });
    });

    updateZones();
    startAuto();
  })();
  </script>
</body>
</html>
