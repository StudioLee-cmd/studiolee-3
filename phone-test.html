<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rotary Phone — Final Test</title>
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@1.0.8/dist/iconify-icon.min.js"></script>
  <style>
    :root { --lime: #C1FF72; --dark: #1F2A2E; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--dark); font-family:'Segoe UI',system-ui,sans-serif; color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; }
    h2 { font-size:28px; margin-bottom:6px; }
    .sub { color:rgba(255,255,255,0.4); margin-bottom:40px; }

    .rotary { position:relative; width:420px; height:420px; user-select:none; }

    .rotary-frame { position:absolute; inset:-15px; z-index:3; pointer-events:none; }
    .rotary-frame img { width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 8px 30px rgba(0,0,0,0.5)); }

    .rotary-disc { position:absolute; inset:0; z-index:2; cursor:grab; }
    .rotary-disc.grabbing { cursor:grabbing; }
    .rotary-disc img { width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 4px 20px rgba(0,0,0,0.3)); }

    .rotary-logo { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:80px; height:80px; z-index:4; pointer-events:none; }
    .rotary-logo img { width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 2px 8px rgba(0,0,0,0.3)); }

    .rotary-info { text-align:center; margin-top:40px; min-height:70px; }
    .rotary-info h3 { color:var(--lime); font-size:22px; margin-bottom:6px; }
    .rotary-info p { color:rgba(255,255,255,0.5); font-size:15px; max-width:380px; margin:0 auto; }

    /* Hover zones */
    .rz { position:absolute; width:65px; height:65px; border-radius:50%; z-index:5; cursor:pointer; transform:translate(-50%,-50%); transition:box-shadow .2s; }
    .rz:hover { box-shadow:0 0 30px rgba(193,255,114,0.5); background:rgba(193,255,114,0.1); }
  </style>
</head>
<body>
  <h2>De AI-tools achter jouw groei</h2>
  <p class="sub">Draai het wiel. Hover voor details.</p>

  <div class="rotary" id="rotary">
    <div class="rotary-frame">
      <img src="/assets/images/ai-marketing-bureau/frame-clean.png" alt="">
    </div>
    <div class="rotary-disc" id="disc">
      <img src="/assets/images/ai-marketing-bureau/disc-clean.png" alt="AI tools dial" draggable="false">
    </div>
    <div class="rotary-logo">
      <img src="/assets/images/logos/logo-badge2.webp" alt="STUDIOLEE">
    </div>
    <div class="rz" id="rz0" data-tool="chatgpt"></div>
    <div class="rz" id="rz1" data-tool="claude"></div>
    <div class="rz" id="rz2" data-tool="n8n"></div>
    <div class="rz" id="rz3" data-tool="ahrefs"></div>
    <div class="rz" id="rz4" data-tool="vapi"></div>
    <div class="rz" id="rz5" data-tool="highlevel"></div>
  </div>

  <div class="rotary-info" id="info">
    <h3>Draai het wiel</h3>
    <p>Hover over een karakter voor meer informatie</p>
  </div>

  <script>
  (function(){
    var tools = {
      chatgpt: {t:'ChatGPT', d:'Strategie, contentcreatie en klantcommunicatie. Van SEO-artikelen tot campagne-ideeën op schaal.'},
      claude: {t:'Claude', d:'Code, automatisering en complete AI-systemen bouwen. Workflows en integraties vanaf scratch.'},
      n8n: {t:'N8N Workflows', d:'Custom automatiseringen voor marketing, administratie en klantopvolging. Draait 24/7.'},
      ahrefs: {t:'Ahrefs', d:'Keyword research, backlink-analyse, content gaps en technische SEO-audits op professioneel niveau.'},
      vapi: {t:'Voice AI', d:'AI telefonist die 24/7 opneemt, afspraken plant en WhatsApp-samenvattingen stuurt.'},
      highlevel: {t:'HighLevel CRM', d:'Alles-in-één: klantbeheer, e-mail, social planner, facturatie en rapportage.'}
    };

    var disc = document.getElementById('disc');
    var wrap = document.getElementById('rotary');
    var angle = 0, dragging = false, startA = 0, startM = 0, vel = 0, lastA = 0, raf;
    var size = 420, center = size/2, radius = 150;

    // Hole positions — matching the image (angles in degrees, 0=right, counter-clockwise)
    // From the image: top=speech bubble, then clockwise: brain, gears, magnifying, phone, gauge
    var holes = [
      {a:-90, tool:'chatgpt'},
      {a:-30, tool:'claude'},
      {a:30,  tool:'n8n'},
      {a:90,  tool:'ahrefs'},
      {a:150, tool:'vapi'},
      {a:210, tool:'highlevel'}
    ];

    function updateZones() {
      holes.forEach(function(h, i) {
        var hz = document.getElementById('rz'+i);
        var rad = (h.a + angle) * Math.PI / 180;
        hz.style.left = (center + radius * Math.cos(rad)) + 'px';
        hz.style.top = (center + radius * Math.sin(rad)) + 'px';
      });
    }

    function mouseAngle(e) {
      var r = wrap.getBoundingClientRect();
      var x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left - center;
      var y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top - center;
      return Math.atan2(y, x) * 180 / Math.PI;
    }

    function down(e) { dragging=true; disc.classList.add('grabbing'); startM=mouseAngle(e); startA=angle; vel=0; if(raf)cancelAnimationFrame(raf); stopAuto(); e.preventDefault(); }
    function move(e) { if(!dragging)return; var m=mouseAngle(e); angle=startA+(m-startM); vel=angle-lastA; lastA=angle; disc.style.transform='rotate('+angle+'deg)'; updateZones(); e.preventDefault(); }
    function up() { if(!dragging)return; dragging=false; disc.classList.remove('grabbing'); function coast(){if(Math.abs(vel)<0.05){startAuto();return;} vel*=0.97; angle+=vel; disc.style.transform='rotate('+angle+'deg)'; updateZones(); raf=requestAnimationFrame(coast);} coast(); }

    disc.addEventListener('mousedown',down);
    disc.addEventListener('touchstart',down,{passive:false});
    window.addEventListener('mousemove',move);
    window.addEventListener('touchmove',move,{passive:false});
    window.addEventListener('mouseup',up);
    window.addEventListener('touchend',up);

    var autoId;
    function startAuto(){if(autoId)return; autoId=setInterval(function(){if(dragging)return; angle+=0.15; disc.style.transform='rotate('+angle+'deg)'; updateZones();},16);}
    function stopAuto(){clearInterval(autoId);autoId=null;}

    document.querySelectorAll('.rz').forEach(function(z){
      z.addEventListener('mouseenter',function(){ stopAuto(); var d=tools[z.dataset.tool]; if(d){document.querySelector('#info h3').textContent=d.t; document.querySelector('#info p').textContent=d.d;} });
      z.addEventListener('mouseleave',function(){ document.querySelector('#info h3').textContent='Draai het wiel'; document.querySelector('#info p').textContent='Hover over een karakter voor meer informatie'; startAuto(); });
    });

    updateZones();
    startAuto();
  })();
  </script>
</body>
</html>
