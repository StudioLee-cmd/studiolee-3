  <style>
    :root { --lime: #C1FF72; --dark: #1F2A2E; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--dark); font-family:'Segoe UI',system-ui,sans-serif; color:#fff; margin:0; padding:0; overflow-x:hidden; min-height:100vh; display:flex; flex-direction:column; }

    .phone-wrapper { flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .phone-container {
      position:relative;
      width:min(100vw, calc((100vh - 50px) * 1752 / 1024));
      aspect-ratio:1752/1024;
      background:url('/assets/images/ai-marketing-bureau/phone-body-wide.jpg') 0 0 / 100% 100% no-repeat;
    }

    /* Dial overlay — positioned as % of container, matching phone dial in image */
    /* Image 1752x1024, dial center at x=1149 y=484 → 65.6% x, 47.3% y */
    .l-numplate { position:absolute; width:15vw; height:15vw; max-width:260px; max-height:260px; top:50%; left:69.5%; transform:translate(-50%,-50%); z-index:2; overflow:hidden; border-radius:50%; clip-path:circle(48%); }
    .numplate-bg { position:absolute; inset:0; background:radial-gradient(circle, #f5f0e0 0%, #ebe5d0 80%, #c0b898 100%); border-radius:50%; box-shadow:inset 0 2px 8px rgba(0,0,0,0.15); }

    .sticker { position:absolute; width:48px; height:48px; transform:translate(-50%,-50%); pointer-events:none; }
    .sticker img { width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }

    .l-finger { position:absolute; width:17vw; height:17vw; max-width:300px; max-height:300px; top:50%; left:69.5%; transform:translate(-50%,-50%); z-index:3; cursor:grab; user-select:none; }
    .l-finger.grabbing { cursor:grabbing; }
    .l-finger img { width:100%; height:100%; object-fit:contain; }

    .l-hub { position:absolute; top:50%; left:69.5%; transform:translate(-50%,-50%); z-index:4;
      width:60px; height:60px; background:radial-gradient(circle, #2a3a3e 0%, var(--dark) 70%);
      border-radius:50%; border:3px solid #8B7355;
      box-shadow:0 0 0 2px rgba(139,115,85,0.3), inset 0 2px 8px rgba(0,0,0,0.4), 0 4px 20px rgba(0,0,0,0.4);
      display:flex; align-items:center; justify-content:center; transition:transform .2s,box-shadow .2s; cursor:pointer; }
    .l-hub:hover { transform:translate(-50%,-50%) scale(1.1); box-shadow:0 0 30px rgba(193,255,114,0.4),0 0 0 2px rgba(139,115,85,0.3),inset 0 2px 8px rgba(0,0,0,0.4),0 4px 20px rgba(0,0,0,0.4); }
    .l-hub img { width:36px; height:36px; object-fit:contain; }

    /* Invisible click zones for dial holes */
    a.rz { position:absolute; width:48px; height:48px; border-radius:50%; z-index:5; transform:translate(-50%,-50%);
      transition:box-shadow .2s, background .2s; text-decoration:none; display:block; pointer-events:auto; }
    a.rz:hover { box-shadow:0 0 30px rgba(193,255,114,0.5); background:rgba(193,255,114,0.15); }

    /* Desk stickers — big, on the left */
    .desk-sticker { position:absolute; z-index:6; width:140px; height:140px; cursor:grab; user-select:none; transition:transform .3s, opacity .5s, filter .3s; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.6)); }
    .desk-sticker img { width:100%; height:100%; object-fit:contain; pointer-events:none; }
    .desk-sticker:hover { filter:drop-shadow(0 8px 16px rgba(0,0,0,0.7)); }
    .desk-sticker.holding .peel-progress { opacity:1; }
    .desk-sticker.unlocked { cursor:move; }
    .peel-progress { position:absolute; bottom:-14px; left:50%; transform:translateX(-50%); width:60px; height:4px; background:rgba(255,255,255,0.15); border-radius:2px; overflow:hidden; opacity:0; }
    .peel-fill { width:0%; height:100%; background:var(--lime); border-radius:2px; transition:width .1s linear; }

    /* Speech bubble */
    .game-overlay { position:absolute; top:30%; left:82%; z-index:10; pointer-events:none; opacity:0; transform:scale(0.8) translateY(10px); transition:all .3s cubic-bezier(0.34,1.56,0.64,1); }
    .game-overlay.visible { opacity:1; transform:scale(1) translateY(0); pointer-events:auto; }
    .game-box { display:inline-block; background:#0a0a0f; border:3px solid var(--lime); border-radius:4px; padding:16px 22px; min-width:260px; position:relative; box-shadow:0 0 20px rgba(193,255,114,0.15), 0 8px 32px rgba(0,0,0,0.6); }
    .game-box::before { content:''; position:absolute; left:-12px; top:50%; transform:translateY(-50%); width:0; height:0; border-top:10px solid transparent; border-bottom:10px solid transparent; border-right:12px solid var(--lime); }
    .game-box::after { content:''; position:absolute; left:-8px; top:50%; transform:translateY(-50%); width:0; height:0; border-top:8px solid transparent; border-bottom:8px solid transparent; border-right:10px solid #0a0a0f; }
    .game-title { font-family:'Enligas','Outfit',sans-serif; font-size:18px; font-weight:700; color:var(--lime); margin-bottom:4px; min-height:14px; white-space:nowrap; }
    .game-desc { color:rgba(255,255,255,0.7); font-size:15px; min-height:16px; }
    .game-title .cur { display:inline-block; width:12px; height:3px; background:var(--lime); animation:blink .5s step-end infinite; vertical-align:middle; margin-left:1px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .call-btn-inline { font-family:'Enligas','Outfit',sans-serif; font-size:14px; font-weight:700; color:var(--dark); background:var(--lime); border:none; padding:8px 20px; border-radius:99px; cursor:pointer; margin-top:10px; pointer-events:auto; transition:transform .2s; }
    .call-btn-inline:hover { transform:scale(1.05); }
    .call-btn-inline.hangup { background:rgba(220,50,50,0.9); color:#fff; }

    /* Clickable phone body overlay (transparent, for click events) */
    .phone-click-zone { position:absolute; top:5%; left:55%; width:30%; height:90%; z-index:1; cursor:pointer; }
    .phone-click-zone.ringing { animation:shake .08s linear infinite; }
    @keyframes shake { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-1.5deg)} 75%{transform:rotate(1.5deg)} }

    .bottom-nav { padding:16px 0; display:flex; gap:16px; flex-wrap:wrap; justify-content:center; }
    .bottom-nav a { color:rgba(255,255,255,0.35); font-size:13px; text-decoration:none; transition:color .2s; }
    .bottom-nav a:hover { color:var(--lime); }

    /* Hide VAPI default widget button */
    #vapi-support-btn, .vapi-btn, [id^="vapi"] { display:none !important; }

    .mobile-heading { display:none; }

    @media(max-width:768px) {
      .l-numplate { width:28vw; height:28vw; }
      .l-finger { width:32vw; height:32vw; }
      .desk-sticker { width:60px; height:60px; }
      .game-overlay { left:50%; top:5%; transform-origin:center; }
      .mobile-heading { display:block; text-align:center; padding:16px 16px 8px; }
      .mobile-heading h1 { font-family:'Enligas','Outfit',sans-serif; font-size:20px; font-weight:700; color:var(--lime); letter-spacing:2px; margin:0; }
      .mobile-heading p { font-family:'Outfit',sans-serif; font-size:13px; color:rgba(255,255,255,0.4); margin-top:4px; }
      .mobile-heading a { color:var(--lime); text-decoration:none; }
    }
  </style>
</head>

  <script>
  (function(){
    var d={
      seo:      {t:'SEO & VINDBAARHEID',   d:'Gevonden worden op Google en in ChatGPT'},
      chatbot:  {t:'AI CHATBOT',           d:'24/7 leadopvang op je website'},
      voice:    {t:'VOICE AI',             d:'AI telefonist die elk gesprek opneemt'},
      reviews:  {t:'REVIEW MANAGEMENT',    d:'5-sterren reviews op autopilot'},
      auto:     {t:'AUTOMATISERING',       d:'N8N workflows en AI-systemen'},
      website:  {t:'WEBSITE LATEN MAKEN',  d:'SEO-geoptimaliseerd, live in 2 weken'},
      herinner: {t:'HERINNERINGEN',        d:'50-70% minder no-shows'}
    };

    function humanType(el, text, onDone) {
      if (window._typeTimer) { clearTimeout(window._typeTimer); window._typeTimer = null; }
      var out = '', pos = 0, mistakes = 0;
      function step() {
        if (pos >= text.length && mistakes <= 0) {
          el.innerHTML = out + '<span class="cur"></span>';
          if (onDone) onDone();
          return;
        }
        if (mistakes > 0) {
          out = out.slice(0, -1); mistakes--;
          el.innerHTML = out + '<span class="cur"></span>';
          window._typeTimer = setTimeout(step, 55);
          return;
        }
        if (pos > 2 && Math.random() < 0.15) {
          var wrong = 'QWRTYPSDFJKLZXCVBN';
          var typoLen = 1 + Math.floor(Math.random() * 2);
          for (var t = 0; t < typoLen; t++) out += wrong[Math.floor(Math.random() * wrong.length)];
          mistakes = typoLen;
          el.innerHTML = out + '<span class="cur"></span>';
          window._typeTimer = setTimeout(step, 300);
          return;
        }
        out += text[pos]; pos++;
        el.innerHTML = out + '<span class="cur"></span>';
        var delay = 35 + Math.random() * 45;
        if (text[pos-1] === ' ') delay = 70 + Math.random() * 80;
        if (Math.random() < 0.04) delay += 250;
        window._typeTimer = setTimeout(step, delay);
      }
      el.innerHTML = '<span class="cur"></span>';
      window._typeTimer = setTimeout(step, 100);
    }

    // Dial spin
    var plate = document.getElementById('plate');
    var wrap = document.getElementById('wrap');
    var a = 0, drag = false, sA = 0, sM = 0, v = 0, lA = 0, raf;
    var calling = false;

    function ma(e) {
      var r = wrap.getBoundingClientRect();
      var x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left - r.width*0.695;
      var y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top - r.height*0.50;
      return Math.atan2(y, x) * 180 / Math.PI;
    }

    function dn(e) {
      if (e.target.closest('.rz') || e.target.closest('.l-hub') || e.target.closest('.desk-sticker')) return;
      e.stopPropagation();
      drag = true; plate.classList.add('grabbing');
      sM = ma(e); sA = a; v = 0;
      if (raf) cancelAnimationFrame(raf);
      stopA(); e.preventDefault();
    }
    function mv(e) {
      if (!drag) return;
      var m = ma(e); a = sA + (m - sM);
      v = a - lA; lA = a;
      plate.style.transform = 'translate(-50%,-50%) rotate(' + a + 'deg)';
      e.preventDefault();
    }
    function up() {
      if (!drag) return; drag = false;
      plate.classList.remove('grabbing');
      function c() {
        if (Math.abs(v) < 0.05) { startA(); return; }
        v *= 0.97; a += v;
        plate.style.transform = 'translate(-50%,-50%) rotate(' + a + 'deg)';
        raf = requestAnimationFrame(c);
      }
      c();
    }

    plate.addEventListener('mousedown', dn);
    plate.addEventListener('touchstart', dn, {passive:false});
    window.addEventListener('mousemove', mv);
    window.addEventListener('touchmove', mv, {passive:false});
    window.addEventListener('mouseup', up);
    window.addEventListener('touchend', up);

    var ai;
    function startA() { if (ai) return; ai = setInterval(function() { if (drag) return; a += 0.15; plate.style.transform = 'translate(-50%,-50%) rotate(' + a + 'deg)'; }, 16); }
    function stopA() { clearInterval(ai); ai = null; }

    // Hover typewriter
    document.querySelectorAll('.rz').forEach(function(z) {
      z.addEventListener('click', function(e) { e.stopPropagation(); });
      z.addEventListener('mouseenter', function() {
        if (calling) return;
        stopA();
        var t = d[z.dataset.t];
        if (t) {
          document.querySelector('.game-overlay').classList.add('visible');
          humanType(document.getElementById('gT'), t.t);
          document.getElementById('gD').textContent = t.d;
          document.getElementById('btnCall').style.display = 'none';
        }
      });
      z.addEventListener('mouseleave', function() {
        if (calling) return;
        if (window._typeTimer) { clearTimeout(window._typeTimer); window._typeTimer = null; }
        restoreDefault();
        startA();
      });
    });

    // Hub hover — same typewriter overlay
    var hub = document.querySelector('.l-hub');
    hub.addEventListener('mouseenter', function() {
      if (calling) return;
      stopA();
      document.querySelector('.game-overlay').classList.add('visible');
      humanType(document.getElementById('gT'), 'AI MARKETING BUREAU');
      document.getElementById('gD').textContent = 'Full-service AI bureau voor het MKB';
      document.getElementById('btnCall').style.display = 'none';
    });
    hub.addEventListener('mouseleave', function() {
      if (calling) return;
      if (window._typeTimer) { clearTimeout(window._typeTimer); window._typeTimer = null; }
      restoreDefault();
      startA();
    });

    // Restore default 404 message
    function restoreDefault() {
      document.querySelector('.game-overlay').classList.add('visible');
      document.getElementById('gT').innerHTML = 'OOPS! VERKEERD GEDRAAID<span class="cur"></span>';
      document.getElementById('gD').textContent = 'Deze pagina bestaat niet meer. Draai het wiel of bel met Lee.';
      document.getElementById('btnCall').style.display = 'none';
    }

    // Click phone = ring
    document.getElementById('phoneBody').addEventListener('click', function(e) {
      if (calling) { endVapiCall(); return; }
      calling = true;
      var video = document.getElementById('phoneVideo');
      if (video) { video.style.display = 'block'; video.play(); }
      this.classList.add('ringing');

      var overlay = document.querySelector('.game-overlay');
      var titleEl = document.getElementById('gT');
      var descEl = document.getElementById('gD');
      var btnCall = document.getElementById('btnCall');
      overlay.classList.add('visible');
      btnCall.style.display = 'none';
      descEl.textContent = '';

      humanType(titleEl, 'TUUT.. TUUT..', function() {
        setTimeout(function() {
          humanType(descEl, 'De telefoon gaat over...', function() {
            setTimeout(function() {
              btnCall.style.display = 'inline-block';
              btnCall.textContent = 'Bel Met Lee';
              btnCall.className = 'call-btn-inline';
            }, 400);
          });
        }, 600);
      });
    });

    // VAPI — widget SDK loaded on demand (requires cookie consent)
    window.startVapiCall = function() {
      var consent = localStorage.getItem('cookie_consent');
      if (consent !== 'accepted') {
        // Show cookie banner if it exists, otherwise prompt
        var banner = document.getElementById('ck-banner');
        if (banner) { banner.style.display = 'flex'; return; }
        // No banner on this page — redirect to accept cookies first
        document.getElementById('btnCall').textContent = 'Accepteer eerst cookies';
        return;
      }
      var btnCall = document.getElementById('btnCall');
      btnCall.textContent = 'Verbinden...';

      function doCall() {
        try {
          var instance = window.vapiSDK.run({
            apiKey: '5cf7462d-30fe-4d70-9ea1-89ce0bd65ec5',
            assistant: '752f8e59-08dd-4f11-9bf1-71f86bd865a4',
            config: { position: 'bottom-right' }
          });
          if (instance && typeof instance.start === 'function') {
            instance.start('752f8e59-08dd-4f11-9bf1-71f86bd865a4');
          }
          window._vapiInstance = instance;
          btnCall.textContent = 'Ophangen';
          btnCall.className = 'call-btn-inline hangup';
          btnCall.onclick = function(e) { e.stopPropagation(); endVapiCall(); };
          // Hide VAPI default UI elements
          setTimeout(function() {
            document.querySelectorAll('[id^="vapi"], .vapi-btn, #vapi-support-btn').forEach(function(el) { el.style.display = 'none'; });
          }, 500);
          // Listen for call end
          if (instance && typeof instance.on === 'function') {
            instance.on('call-end', function() { endVapiCall(); });
          }
        } catch(err) {
          console.error('VAPI error:', err);
          btnCall.textContent = 'Fout — probeer opnieuw';
        }
      }

      if (window.vapiSDK) { doCall(); }
      else {
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js';
        s.onload = function() {
          var poll = setInterval(function() {
            if (window.vapiSDK) { clearInterval(poll); doCall(); }
          }, 200);
        };
        s.onerror = function() { btnCall.textContent = 'Laden mislukt'; };
        document.body.appendChild(s);
      }
    };

    window.endVapiCall = function() {
      if (window._vapiInstance && typeof window._vapiInstance.stop === 'function') window._vapiInstance.stop();
      calling = false;
      document.getElementById('phoneBody').classList.remove('ringing');
      var video = document.getElementById('phoneVideo');
      if (video) { video.pause(); video.style.display = 'none'; }
      restoreDefault();
    };

    startA();

    // Desk stickers: hold 5s → sticks to finger, drag freely
    (function() {
      var HOLD_MS = 5000;
      // Prevent long-press context menu on stickers
      document.addEventListener('contextmenu', function(e) {
        if (e.target.closest('.desk-sticker')) e.preventDefault();
      });

      document.querySelectorAll('.desk-sticker').forEach(function(s) {
        var holdTimer = null, progTimer = null, startTime = 0;
        var fill = s.querySelector('.peel-fill');
        var unlocked = false, dragging = false, ox = 0, oy = 0;
        var lastTouch = null;

        s.addEventListener('mousedown', onDown);
        s.addEventListener('touchstart', onDown, {passive:false});

        function getXY(e) {
          if (e.touches && e.touches.length) return {x:e.touches[0].clientX, y:e.touches[0].clientY};
          if (lastTouch) return lastTouch;
          return {x:e.clientX, y:e.clientY};
        }

        function startDrag(e) {
          dragging = true;
          var rect = s.getBoundingClientRect();
          var pt = getXY(e);
          ox = pt.x - rect.left;
          oy = pt.y - rect.top;
          s.style.zIndex = '20';
          s.style.transition = 'none';
        }

        function onDown(e) {
          e.preventDefault();
          e.stopPropagation();
          if (e.touches) lastTouch = {x:e.touches[0].clientX, y:e.touches[0].clientY};

          if (unlocked) {
            startDrag(e);
            return;
          }

          // Start hold timer
          s.classList.add('holding');
          startTime = Date.now();
          fill.style.width = '0%';

          progTimer = setInterval(function() {
            var pct = Math.min(100, ((Date.now() - startTime) / HOLD_MS) * 100);
            fill.style.width = pct + '%';
          }, 50);

          holdTimer = setTimeout(function() {
            unlocked = true;
            s.classList.remove('holding');
            s.classList.add('unlocked');
            clearInterval(progTimer); progTimer = null;
            fill.style.width = '0%';
            // Immediately start dragging — finger is still down
            startDrag(e);
          }, HOLD_MS);
        }

        function onUp() {
          if (dragging) {
            dragging = false;
            s.style.zIndex = '6';
            s.style.transition = '';
            return;
          }
          if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
          if (progTimer) { clearInterval(progTimer); progTimer = null; }
          s.classList.remove('holding');
          fill.style.width = '0%';
        }

        function onMove(e) {
          if (e.touches && e.touches.length) lastTouch = {x:e.touches[0].clientX, y:e.touches[0].clientY};
          if (!dragging) return;
          e.preventDefault();
          var pt = getXY(e);
          var pr = s.parentElement.getBoundingClientRect();
          s.style.left = (pt.x - pr.left - ox) + 'px';
          s.style.top = (pt.y - pr.top - oy) + 'px';
          s.style.transform = 'none';
        }

        window.addEventListener('mouseup', onUp);
        window.addEventListener('touchend', onUp);
        window.addEventListener('touchcancel', onUp);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('touchmove', onMove, {passive:false});
      });
    })();
  })();
  </script>
</body>
</html>
