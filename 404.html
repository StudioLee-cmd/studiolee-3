    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    :root { --lime: #C1FF72; --dark: #1F2A2E; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--dark); font-family:'Segoe UI',system-ui,sans-serif; color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:40px 20px; overflow-x:hidden; }

    .err-title { font-family:'Press Start 2P',monospace; font-size:13px; color:var(--lime); letter-spacing:2px; margin-bottom:8px; }
    .err-sub { color:rgba(255,255,255,0.5); font-size:15px; margin-bottom:36px; text-align:center; line-height:1.6; }
    .err-sub a { color:var(--lime); text-decoration:none; }
    .err-sub a:hover { text-decoration:underline; }

    .phone-container { position:relative; width:480px; height:520px; }
    .l-body { position:absolute; inset:0; z-index:1; cursor:pointer; }
    .l-body img { width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 12px 40px rgba(0,0,0,0.6)); transition:filter .3s; }
    .l-body:hover img { filter:drop-shadow(0 12px 40px rgba(0,0,0,0.6)) brightness(1.08); }
    .l-body.ringing img { animation:shake .08s linear infinite; }
    @keyframes shake { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-1.5deg)} 75%{transform:rotate(1.5deg)} }

    .l-numplate { position:absolute; width:240px; height:240px; top:50%; left:49%; transform:translate(-50%,-50%); z-index:2; }
    .numplate-bg { position:absolute; inset:0; background:radial-gradient(circle, #f5f0e0 0%, #ebe5d0 80%, #ddd5c0 100%); border-radius:50%; border:2px solid #c0b898; box-shadow:inset 0 2px 8px rgba(0,0,0,0.15); }
    .sticker { position:absolute; width:52px; height:52px; transform:translate(-50%,-50%); pointer-events:none; }
    .sticker img { width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }

    .l-finger { position:absolute; width:275px; height:275px; top:50%; left:49%; transform:translate(-50%,-50%); z-index:3; cursor:grab; user-select:none; }
    .l-finger.grabbing { cursor:grabbing; }
    .l-finger img { width:100%; height:100%; object-fit:contain; }

    .l-hub { position:absolute; top:50%; left:49%; transform:translate(-50%,-50%); z-index:4; pointer-events:none;
      width:68px; height:68px; background:radial-gradient(circle, #2a3a3e 0%, var(--dark) 70%);
      border-radius:50%; border:3px solid #8B7355;
      box-shadow:0 0 0 2px rgba(139,115,85,0.3), inset 0 2px 8px rgba(0,0,0,0.4), 0 4px 20px rgba(0,0,0,0.4);
      display:flex; align-items:center; justify-content:center; }
    .l-hub img { width:42px; height:42px; object-fit:contain; }

    a.rz { position:absolute; width:56px; height:56px; border-radius:50%; z-index:5; transform:translate(-50%,-50%);
      transition:box-shadow .2s, background .2s; text-decoration:none; display:block; }
    a.rz:hover { box-shadow:0 0 30px rgba(193,255,114,0.5); background:rgba(193,255,114,0.15); }

    /* Game info — overlaid on the phone */
    .game-overlay { position:absolute; top:-20px; right:-180px; z-index:10; pointer-events:none; opacity:0; transform:scale(0.8) translateY(10px); transition:all .3s cubic-bezier(0.34,1.56,0.64,1); }
    .game-overlay.visible { opacity:1; transform:scale(1) translateY(0); }
    .game-box { display:inline-block; background:#0a0a0f; border:3px solid var(--lime); border-radius:4px; padding:16px 22px; min-width:260px; position:relative; box-shadow:0 0 20px rgba(193,255,114,0.15), 0 8px 32px rgba(0,0,0,0.6); }
    .game-box::before { content:''; position:absolute; left:-12px; top:50%; transform:translateY(-50%); width:0; height:0; border-top:10px solid transparent; border-bottom:10px solid transparent; border-right:12px solid var(--lime); }
    .game-box::after { content:''; position:absolute; left:-8px; top:50%; transform:translateY(-50%); width:0; height:0; border-top:8px solid transparent; border-bottom:8px solid transparent; border-right:10px solid #0a0a0f; }
    .game-title { font-family:'Press Start 2P',monospace; font-size:13px; color:var(--lime); margin-bottom:4px; min-height:14px; white-space:nowrap; }
    .game-desc { color:rgba(255,255,255,0.7); font-size:15px; min-height:16px; }
    .game-title .cur { display:inline-block; width:7px; height:12px; background:var(--lime); animation:blink .5s step-end infinite; vertical-align:middle; margin-left:1px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .click-hint { color:rgba(255,255,255,0.2); font-family:'Press Start 2P',monospace; font-size:8px; margin-top:70px; animation:pulse-hint 2.5s ease-in-out infinite; }
    @keyframes pulse-hint { 0%,100%{opacity:0.2} 50%{opacity:0.5} }

    /* Call overlay */
    
    
    
    
    
    
    
    

    .bottom-nav { margin-top:80px; display:flex; gap:16px; flex-wrap:wrap; justify-content:center; }
    .bottom-nav a { color:rgba(255,255,255,0.35); font-size:13px; text-decoration:none; transition:color .2s; }
    .bottom-nav a:hover { color:var(--lime); }

    @media(max-width:520px) { .phone-container{width:340px;height:380px;} .l-numplate{width:190px;height:190px;} .l-finger{width:200px;height:200px;} .sticker{width:38px;height:38px;} }
  </style>
</head>
<body>

  <p class="err-sub">De pagina die je zoekt bestaat niet.<br>Draai het wiel om terug te navigeren, of ga naar de <a href="/">homepage</a>.</p>

  <!-- VAPI SDK -->
  <script src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js" defer></script>

  <script>
  (function(){
    // ── Tool data ──
    var d={
      seo:      {t:'SEO & VINDBAARHEID',   d:'Gevonden worden op Google en in ChatGPT'},
      chatbot:  {t:'AI CHATBOT',           d:'24/7 leadopvang op je website'},
      voice:    {t:'VOICE AI',             d:'AI telefonist die elk gesprek opneemt'},
      reviews:  {t:'REVIEW MANAGEMENT',    d:'5-sterren reviews op autopilot'},
      auto:     {t:'AUTOMATISERING',       d:'N8N workflows en AI-systemen'},
      website:  {t:'WEBSITE LATEN MAKEN',  d:'SEO-geoptimaliseerd, live in 2 weken'},
      herinner: {t:'HERINNERINGEN',        d:'50-70% minder no-shows'}
    };

    // ── Human-like typewriter with mistakes ──
    function humanType(el, text, onDone) {
      var current = '';
      var i = 0;
      var mistakeChance = 0.18;
      var inMistake = false;
      var toDelete = 0;

      function render() {
        el.innerHTML = current + '<span class="cur"></span>';
      }

      function tick() {
        // All done
        if (i >= text.length && !inMistake) {
          render();
          if (onDone) onDone();
          return;
        }

        // Currently backspacing a mistake
        if (inMistake) {
          if (toDelete > 0) {
            current = current.slice(0, -1);
            toDelete--;
            render();
            setTimeout(tick, 50 + Math.random() * 30);
          } else {
            inMistake = false;
            setTimeout(tick, 150 + Math.random() * 100);
          }
          return;
        }

        // Maybe make a mistake (type 1-3 wrong chars, then backspace)
        if (i < text.length && i > 1 && Math.random() < mistakeChance) {
          inMistake = true;
          var wrongLen = 1 + Math.floor(Math.random() * 2);
          var nearby = 'QWERTYUIOPASDFGHJKLZXCVBNM';
          for (var m = 0; m < wrongLen; m++) {
            current += nearby[Math.floor(Math.random() * nearby.length)];
          }
          toDelete = wrongLen;
          render();
          // Pause before realizing the mistake
          setTimeout(tick, 250 + Math.random() * 250);
          return;
        }

        // Normal character
        current += text[i];
        i++;
        render();

        var ch = text[i - 1];
        var delay;
        if (ch === ' ') delay = 60 + Math.random() * 100;
        else if ('.!?'.indexOf(ch) >= 0) delay = 200 + Math.random() * 400;
        else delay = 30 + Math.random() * 50;

        // Random thinking pause
        if (Math.random() < 0.06) delay += 200 + Math.random() * 400;

        setTimeout(tick, delay);
      }

      current = '';
      i = 0;
      render();
      setTimeout(tick, 150);
    }

    // ── Dial spin ──
    var plate=document.getElementById('plate'), wrap=document.getElementById('wrap');
    var a=0,drag=false,sA=0,sM=0,v=0,lA=0,raf;

    function ma(e){var r=wrap.getBoundingClientRect();var x=(e.touches?e.touches[0].clientX:e.clientX)-r.left-480*.49;var y=(e.touches?e.touches[0].clientY:e.clientY)-r.top-520*.50;return Math.atan2(y,x)*180/Math.PI;}
    function dn(e){if(e.target.closest('.rz'))return;drag=true;plate.classList.add('grabbing');sM=ma(e);sA=a;v=0;if(raf)cancelAnimationFrame(raf);stopA();e.preventDefault();}
    function mv(e){if(!drag)return;var m=ma(e);a=sA+(m-sM);v=a-lA;lA=a;plate.style.transform='translate(-50%,-50%) rotate('+a+'deg)';e.preventDefault();}
    function up(){if(!drag)return;drag=false;plate.classList.remove('grabbing');function c(){if(Math.abs(v)<.05){startA();return;}v*=.97;a+=v;plate.style.transform='translate(-50%,-50%) rotate('+a+'deg)';raf=requestAnimationFrame(c);}c();}

    plate.addEventListener('mousedown',dn);plate.addEventListener('touchstart',dn,{passive:false});
    window.addEventListener('mousemove',mv);window.addEventListener('touchmove',mv,{passive:false});
    window.addEventListener('mouseup',up);window.addEventListener('touchend',up);

    var ai;function startA(){if(ai)return;ai=setInterval(function(){if(drag)return;a+=.15;plate.style.transform='translate(-50%,-50%) rotate('+a+'deg)';},16);}
    function stopA(){clearInterval(ai);ai=null;}

    // ── Hover with human typewriter ──
    document.querySelectorAll('.rz').forEach(function(z){
      z.addEventListener('mouseenter',function(){
        stopA();
        var t=d[z.dataset.t];
        if(t){
          document.querySelector('.game-overlay').classList.add('visible');
          humanType(document.getElementById('gT'), t.t);
          document.getElementById('gD').textContent=t.d;
        }
      });
      z.addEventListener('mouseleave',function(){
        humanType(document.getElementById('gT'), 'KIES EEN DIENST');
        document.getElementById('gD').textContent='Draai de schijf of klik op de telefoon';
        startA();
      });
    });

    // ── Click phone to call — video plays INLINE replacing the image ──
    var calling = false;
    document.getElementById('phoneBody').addEventListener('click', function(e){
      var rect = document.getElementById('plate').getBoundingClientRect();
      var x = e.clientX - rect.left;
      var y = e.clientY - rect.top;
      var dist = Math.sqrt(Math.pow(x - rect.width/2, 2) + Math.pow(y - rect.height/2, 2));
      if (dist < rect.width/2 + 10) return;
      if (calling) return;
      calling = true;

      // Swap image for video — phone comes alive in place
      var img = document.getElementById('phoneImg');
      var video = document.getElementById('phoneVideo');
      img.style.display = 'none';
      video.style.display = 'block';
      video.play();

      // Ringing shake
      this.classList.add('ringing');

      // Type call sequence in the game info box
      var titleEl = document.getElementById('gT');
      var descEl = document.getElementById('gD');
      var msgs = [
        {t: 'BELLEN...', d: 'Verbinding maken met STUDIOLEE', wait: 2000},
        {t: 'TUUT.. TUUT..', d: 'De telefoon gaat over', wait: 2500},
        {t: 'VERBINDEN...', d: 'Even geduld alsjeblieft', wait: 2000},
        {t: 'VERBONDEN!', d: 'Je spreekt nu met onze AI-assistent', wait: 1500}
      ];

      var mi = 0;
      function nextMsg() {
        if (mi >= msgs.length) {
          document.getElementById('phoneBody').classList.remove('ringing');
          // Start VAPI call
          if (window.vapiSDK) {
            try {
              var vapi = window.vapiSDK.run({
                apiKey: '5cf7462d-30fe-4d70-9ea1-89ce0bd65ec5',
                assistant: '752f8e59-08dd-4f11-9bf1-71f86bd865a4',
                config: { position: 'bottom-right' }
              });
              // Force-start the call immediately — no extra click needed
              if (vapi && typeof vapi.start === 'function') {
                vapi.start();
              }
            } catch(err) { console.error('VAPI error:', err); }
          }
          return;
        }
        descEl.textContent = msgs[mi].d;
        humanType(titleEl, msgs[mi].t, function() {
          mi++;
          setTimeout(nextMsg, msgs[mi-1].wait);
        });
      }
      nextMsg();
    });

    startA();
  })();
  </script>
</body>
