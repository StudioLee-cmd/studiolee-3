  <style>
    
    :root { --lime: #C1FF72; --dark: #1F2A2E; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--dark); font-family:'Segoe UI',system-ui,sans-serif; color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:40px 20px; overflow-x:hidden; }

    .err-title { font-family:'Enligas','Outfit',sans-serif; font-size:28px; font-weight:800; color:var(--lime); letter-spacing:2px; margin-bottom:8px; }
    .err-sub { color:rgba(255,255,255,0.5); font-size:15px; margin-bottom:36px; text-align:center; line-height:1.6; }
    .err-sub a { color:var(--lime); text-decoration:none; }
    .err-sub a:hover { text-decoration:underline; }

    .phone-container { position:relative; width:100vw; max-width:100vw; margin-left:calc(-50vw + 50%); aspect-ratio:2.4/1; }
    .l-body { position:absolute; inset:0; z-index:1; cursor:pointer; }
    .l-body img { width:100%; height:100%; object-fit:cover; filter:drop-shadow(0 12px 40px rgba(0,0,0,0.6)); transition:filter .3s; }
    .l-body:hover img { filter:drop-shadow(0 12px 40px rgba(0,0,0,0.6)) brightness(1.08); }
    .l-body.ringing img { animation:shake .08s linear infinite; }
    @keyframes shake { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-1.5deg)} 75%{transform:rotate(1.5deg)} }

    .l-numplate { position:absolute; width:220px; height:220px; top:48%; left:50%; transform:translate(-50%,-50%); z-index:2; overflow:hidden; border-radius:50%; clip-path:circle(48%); }
    .numplate-bg { position:absolute; inset:0; background:radial-gradient(circle, #f5f0e0 0%, #ebe5d0 80%, #c0b898 100%); border-radius:50%; border:none; box-shadow:inset 0 2px 8px rgba(0,0,0,0.15); }
    
    .sticker { position:absolute; width:48px; height:48px; transform:translate(-50%,-50%); pointer-events:none; }
    .sticker img { width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }

    .l-finger { position:absolute; width:255px; height:255px; top:48%; left:50%; transform:translate(-50%,-50%); z-index:3; cursor:grab; user-select:none; }
    .l-finger.grabbing { cursor:grabbing; }
    .l-finger img { width:100%; height:100%; object-fit:contain; }

    .l-hub { position:absolute; top:50%; left:49%; transform:translate(-50%,-50%); z-index:4;
      width:60px; height:60px; background:radial-gradient(circle, #2a3a3e 0%, var(--dark) 70%);
      border-radius:50%; border:3px solid #8B7355;
      box-shadow:0 0 0 2px rgba(139,115,85,0.3), inset 0 2px 8px rgba(0,0,0,0.4), 0 4px 20px rgba(0,0,0,0.4);
      display:flex; align-items:center; justify-content:center; transition:transform .2s,box-shadow .2s; cursor:pointer; }
    .l-hub:hover { transform:translate(-50%,-50%) scale(1.1); box-shadow:0 0 30px rgba(193,255,114,0.4),0 0 0 2px rgba(139,115,85,0.3),inset 0 2px 8px rgba(0,0,0,0.4),0 4px 20px rgba(0,0,0,0.4); }
    .l-hub img { width:36px; height:36px; object-fit:contain; }

    a.rz { position:absolute; width:48px; height:48px; border-radius:50%; z-index:5; transform:translate(-50%,-50%);
      transition:box-shadow .2s, background .2s; text-decoration:none; display:block; }
    a.rz { pointer-events:auto; }
    a.rz:hover { box-shadow:0 0 30px rgba(193,255,114,0.5); background:rgba(193,255,114,0.15); }

    /* Desk stickers */
    .desk-sticker { position:absolute; z-index:6; width:64px; height:64px; cursor:grab; user-select:none; transition:transform .3s, opacity .5s, filter .3s; filter:drop-shadow(0 3px 6px rgba(0,0,0,0.5)); }
    .desk-sticker img { width:100%; height:100%; object-fit:contain; pointer-events:none; }
    .desk-sticker:hover { transform:scale(1.1) rotate(-3deg); filter:drop-shadow(0 6px 12px rgba(0,0,0,0.6)); }
    .desk-sticker.peeling { animation:peel-wobble .4s ease-in-out infinite; }
    .desk-sticker.peeled { opacity:0; transform:scale(0.3) rotate(180deg); pointer-events:none; }
    @keyframes peel-wobble { 0%,100%{transform:rotate(-2deg) scale(1.05)} 50%{transform:rotate(2deg) scale(1.08)} }
    .desk-sticker .peel-ring { position:absolute; inset:-6px; border:3px solid var(--lime); border-radius:50%; opacity:0; transition:opacity .2s; }
    .desk-sticker.peeling .peel-ring { opacity:1; animation:peel-pulse 1s linear infinite; }
    @keyframes peel-pulse { 0%{transform:scale(1);opacity:1} 100%{transform:scale(1.4);opacity:0} }
    .peel-progress { position:absolute; bottom:-14px; left:50%; transform:translateX(-50%); width:48px; height:4px; background:rgba(255,255,255,0.15); border-radius:2px; overflow:hidden; opacity:0; }
    .desk-sticker.peeling .peel-progress { opacity:1; }
    .peel-fill { width:0%; height:100%; background:var(--lime); border-radius:2px; transition:width .1s linear; }

    /* Game info — overlaid on the phone */
    .game-overlay { position:absolute; top:-20px; right:-180px; z-index:10; pointer-events:none; opacity:0; transform:scale(0.8) translateY(10px); transition:all .3s cubic-bezier(0.34,1.56,0.64,1); }
    .game-overlay.visible { opacity:1; transform:scale(1) translateY(0); pointer-events:auto; }
    .game-box { display:inline-block; background:#0a0a0f; border:3px solid var(--lime); border-radius:4px; padding:16px 22px; min-width:260px; position:relative; box-shadow:0 0 20px rgba(193,255,114,0.15), 0 8px 32px rgba(0,0,0,0.6); }
    .game-box::before { content:''; position:absolute; left:-12px; top:50%; transform:translateY(-50%); width:0; height:0; border-top:10px solid transparent; border-bottom:10px solid transparent; border-right:12px solid var(--lime); }
    .game-box::after { content:''; position:absolute; left:-8px; top:50%; transform:translateY(-50%); width:0; height:0; border-top:8px solid transparent; border-bottom:8px solid transparent; border-right:10px solid #0a0a0f; }
    .game-title { font-family:'Enligas','Outfit',sans-serif; font-size:18px; font-weight:700; color:var(--lime); margin-bottom:4px; min-height:14px; white-space:nowrap; }
    .game-desc { color:rgba(255,255,255,0.7); font-size:15px; min-height:16px; }
    .game-title .cur { display:inline-block; width:12px; height:3px; background:var(--lime); vertical-align:baseline; animation:blink .5s step-end infinite; vertical-align:middle; margin-left:1px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .click-hint { color:rgba(255,255,255,0.2); font-family:'Outfit',sans-serif; font-size:12px; letter-spacing:2px; margin-top:70px; animation:pulse-hint 2.5s ease-in-out infinite; }
    @keyframes pulse-hint { 0%,100%{opacity:0.2} 50%{opacity:0.5} }

    /* Call overlay */
    
    
    
    
    
    
    
    

    .bottom-nav { margin-top:80px; display:flex; gap:16px; flex-wrap:wrap; justify-content:center; }
    .bottom-nav a { color:rgba(255,255,255,0.35); font-size:13px; text-decoration:none; transition:color .2s; }
    .bottom-nav a:hover { color:var(--lime); }

    @media(max-width:520px) { .phone-container{width:340px;height:380px;} .l-numplate{width:190px;height:190px;} .l-finger{width:200px;height:200px;} .sticker{width:38px;height:38px;} }
  
    .call-btn-inline { font-family:'Enligas','Outfit',sans-serif; font-size:14px; font-weight:700; color:var(--dark); background:var(--lime); border:none; padding:8px 20px; border-radius:99px; cursor:pointer; margin-top:10px; pointer-events:auto; transition:transform .2s; }
    .call-btn-inline:hover { transform:scale(1.05); }
    .call-btn-inline.hangup { background:rgba(220,50,50,0.9); color:#fff; }
    
    
    
    
    
    
  
    /* Hide VAPI default widget button */
    #vapi-support-btn, .vapi-btn, [id^="vapi"] { display:none !important; }
  </style>

  <!-- VAPI SDK -->
  

  <script>
  (function(){
    // ── Tool data ──
    var d={
      seo:      {t:'SEO & VINDBAARHEID',   d:'Gevonden worden op Google en in ChatGPT'},
      chatbot:  {t:'AI CHATBOT',           d:'24/7 leadopvang op je website'},
      voice:    {t:'VOICE AI',             d:'AI telefonist die elk gesprek opneemt'},
      reviews:  {t:'REVIEW MANAGEMENT',    d:'5-sterren reviews op autopilot'},
      auto:     {t:'AUTOMATISERING',       d:'N8N workflows en AI-systemen'},
      website:  {t:'WEBSITE LATEN MAKEN',  d:'SEO-geoptimaliseerd, live in 2 weken'},
      herinner: {t:'HERINNERINGEN',        d:'50-70% minder no-shows'}
    };

    // ── Human typewriter with mistakes ──
    function humanType(el, text, onDone) {
      if (window._typeTimer) { clearTimeout(window._typeTimer); window._typeTimer = null; }
      var out = '', pos = 0, mistakes = 0;
      function step() {
        if (pos >= text.length && mistakes <= 0) {
          el.innerHTML = out + '<span class="cur"></span>';
          if (onDone) onDone();
          return;
        }
        if (mistakes > 0) {
          out = out.slice(0, -1); mistakes--;
          el.innerHTML = out + '<span class="cur"></span>';
          window._typeTimer = setTimeout(step, 55);
          return;
        }
        if (pos > 2 && Math.random() < 0.15) {
          var wrong = 'QWRTYPSDFJKLZXCVBN';
          var typoLen = 1 + Math.floor(Math.random() * 2);
          for (var t = 0; t < typoLen; t++) out += wrong[Math.floor(Math.random() * wrong.length)];
          mistakes = typoLen;
          el.innerHTML = out + '<span class="cur"></span>';
          window._typeTimer = setTimeout(step, 300);
          return;
        }
        out += text[pos]; pos++;
        el.innerHTML = out + '<span class="cur"></span>';
        var delay = 35 + Math.random() * 45;
        if (text[pos-1] === ' ') delay = 70 + Math.random() * 80;
        if (Math.random() < 0.04) delay += 250;
        window._typeTimer = setTimeout(step, delay);
      }
      out = ''; pos = 0;
      el.innerHTML = '<span class="cur"></span>';
      window._typeTimer = setTimeout(step, 100);
    }

    // ── Dial spin ──
    var plate = document.getElementById('plate');
    var wrap = document.getElementById('wrap');
    var a = 0, drag = false, sA = 0, sM = 0, v = 0, lA = 0, raf;
    var calling = false;

    function ma(e) {
      var r = wrap.getBoundingClientRect();
      var x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left - r.width*0.50;
      var y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top - r.height*0.48;
      return Math.atan2(y, x) * 180 / Math.PI;
    }

    function dn(e) {
      if (e.target.closest('.rz') || e.target.closest('.l-hub')) return;
      e.stopPropagation();
      drag = true; plate.classList.add('grabbing');
      sM = ma(e); sA = a; v = 0;
      if (raf) cancelAnimationFrame(raf);
      stopA(); e.preventDefault();
    }
    function mv(e) {
      if (!drag) return;
      var m = ma(e); a = sA + (m - sM);
      v = a - lA; lA = a;
      plate.style.transform = 'translate(-50%,-50%) rotate(' + a + 'deg)';
      e.preventDefault();
    }
    function up() {
      if (!drag) return; drag = false;
      plate.classList.remove('grabbing');
      function c() {
        if (Math.abs(v) < 0.05) { startA(); return; }
        v *= 0.97; a += v;
        plate.style.transform = 'translate(-50%,-50%) rotate(' + a + 'deg)';
        raf = requestAnimationFrame(c);
      }
      c();
    }

    plate.addEventListener('mousedown', dn);
    plate.addEventListener('touchstart', dn, {passive:false});
    window.addEventListener('mousemove', mv);
    window.addEventListener('touchmove', mv, {passive:false});
    window.addEventListener('mouseup', up);
    window.addEventListener('touchend', up);

    var ai;
    function startA() { if (ai) return; ai = setInterval(function() { if (drag) return; a += 0.15; plate.style.transform = 'translate(-50%,-50%) rotate(' + a + 'deg)'; }, 16); }
    function stopA() { clearInterval(ai); ai = null; }

    // ── Hover with typewriter ──
    document.querySelectorAll('.rz').forEach(function(z) {
      z.addEventListener('click', function(e) { e.stopPropagation(); });
      z.addEventListener('mouseenter', function() {
        stopA();
        var t = d[z.dataset.t];
        if (t) {
          document.querySelector('.game-overlay').classList.add('visible');
          humanType(document.getElementById('gT'), t.t);
          document.getElementById('gD').textContent = t.d;
          document.getElementById('btnCall').style.display = 'none';
        }
      });
      z.addEventListener('mouseleave', function() {
        if (window._typeTimer) { clearTimeout(window._typeTimer); window._typeTimer = null; }
        document.querySelector('.game-overlay').classList.remove('visible');
        document.getElementById('gT').innerHTML = '';
        document.getElementById('gD').textContent = '';
        startA();
      });
    });

    // ── Click phone = start ringing. Click again = stop. ──
    document.getElementById('phoneBody').addEventListener('click', function(e) {
      // Toggle off
      if (calling) {
        endVapiCall();
        return;
      }
      calling = true;

      // Start video + ringing
      var img = document.getElementById('phoneImg');
      var video = document.getElementById('phoneVideo');
      if (video) { img.style.display = 'none'; video.style.display = 'block'; video.play(); }
      this.classList.add('ringing');

      // Show speech bubble, type both lines, then show button
      var overlay = document.querySelector('.game-overlay');
      var titleEl = document.getElementById('gT');
      var descEl = document.getElementById('gD');
      var btnCall = document.getElementById('btnCall');

      overlay.classList.add('visible');
      btnCall.style.display = 'none';
      descEl.textContent = '';

      humanType(titleEl, 'TUUT.. TUUT..', function() {
        setTimeout(function() {
          humanType(descEl, 'De telefoon gaat over...', function() {
            setTimeout(function() {
              btnCall.style.display = 'inline-block';
              btnCall.textContent = 'Bel Met Lee';
              btnCall.className = 'call-btn-inline';
            }, 400);
          });
        }, 600);
      });
    });

    // ── VAPI functions ──
    var _vapiInstance = null;

    window.startVapiCall = function() {
      var btnCall = document.getElementById('btnCall');
      btnCall.textContent = 'Verbinden...';

      function doCall() {
        try {
          _vapiInstance = window.vapiSDK.run({
            apiKey: '5cf7462d-30fe-4d70-9ea1-89ce0bd65ec5',
            assistant: '752f8e59-08dd-4f11-9bf1-71f86bd865a4',
            config: { position: 'bottom-right' }
          });
          if (_vapiInstance && typeof _vapiInstance.start === 'function') {
            _vapiInstance.start();
          }
          btnCall.textContent = 'Ophangen';
          btnCall.className = 'call-btn-inline hangup';
          btnCall.onclick = function(e) { e.stopPropagation(); endVapiCall(); };
          setTimeout(function() {
            document.querySelectorAll('[id^="vapi"]').forEach(function(el) { el.style.display = 'none'; });
          }, 500);
          if (_vapiInstance) {
            _vapiInstance.on('call-end', function() { endVapiCall(); });
          }
        } catch(err) {
          console.error('VAPI error:', err);
          window.location.href = '/voice-ai';
        }
      }

      if (window.vapiSDK) {
        doCall();
      } else {
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js';
        s.onload = function() {
          var poll = setInterval(function() {
            if (window.vapiSDK) { clearInterval(poll); doCall(); }
          }, 100);
        };
        document.body.appendChild(s);
      }
    };

    window.endVapiCall = function() {
      if (_vapiInstance && typeof _vapiInstance.stop === 'function') _vapiInstance.stop();
      _vapiInstance = null;
      calling = false;
      document.getElementById('phoneBody').classList.remove('ringing');
      document.querySelector('.game-overlay').classList.remove('visible');
      document.getElementById('btnCall').style.display = 'none';
      document.getElementById('gT').innerHTML = '';
      document.getElementById('gD').textContent = '';
      var img = document.getElementById('phoneImg');
      var video = document.getElementById('phoneVideo');
      if (video) { video.pause(); video.style.display = 'none'; img.style.display = 'block'; }
      document.querySelectorAll('[id^="vapi"]').forEach(function(el) { el.style.display = 'none'; });
    };

    startA();

    // ── Desk stickers: hold 5s to peel ──
    var HOLD_MS = 5000;
    document.querySelectorAll('.desk-sticker').forEach(function(s) {
      var timer = null, startTime = 0, progInterval = null;
      var fill = s.querySelector('.peel-fill');

      function beginPeel(e) {
        e.preventDefault();
        if (s.classList.contains('peeled')) return;
        s.classList.add('peeling');
        startTime = Date.now();
        fill.style.width = '0%';
        progInterval = setInterval(function() {
          var pct = Math.min(100, ((Date.now() - startTime) / HOLD_MS) * 100);
          fill.style.width = pct + '%';
        }, 50);
        timer = setTimeout(function() {
          s.classList.remove('peeling');
          s.classList.add('peeled');
          clearInterval(progInterval);
          // Navigate to service after peel animation
          var svc = s.dataset.service;
          var urls = {seo:'/seo',chatbot:'/chatbot',voice:'/voice-ai',reviews:'/reviews',auto:'/automations',website:'/website-laten-maken',herinner:'/herinneringen'};
          if (urls[svc]) setTimeout(function(){ window.location.href = urls[svc]; }, 600);
        }, HOLD_MS);
      }

      function cancelPeel() {
        if (timer) { clearTimeout(timer); timer = null; }
        if (progInterval) { clearInterval(progInterval); progInterval = null; }
        s.classList.remove('peeling');
        fill.style.width = '0%';
      }

      s.addEventListener('mousedown', beginPeel);
      s.addEventListener('touchstart', beginPeel, {passive:false});
      s.addEventListener('mouseup', cancelPeel);
      s.addEventListener('mouseleave', cancelPeel);
      s.addEventListener('touchend', cancelPeel);
      s.addEventListener('touchcancel', cancelPeel);
    });
  })();
  </script>
</body>
</html>
