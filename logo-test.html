<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Logo Keuze V2 — Robot + Propellervliegtuig</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
  <style>
    body { background: #f0f0f0; padding: 40px 0; }
    .card { transition: transform 0.2s; cursor: pointer; }
    .card:hover { transform: scale(1.05); box-shadow: 0 8px 30px rgba(0,0,0,0.15) !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="mb-2">STUDIOLEE Logo V2</h1>
    <p class="text-muted fs-5 mb-5">Cartoon robotje in propellervliegtuig. "Laat het draaien" thema.</p>
    <div class="row">
    <div class="col-md-4 col-lg-3 mb-4">
      <div class="card h-100 border-0 shadow-sm" style="background: #1F2A2E; border-radius: 12px;">
        <div class="p-4 text-center">
          <img src="/assets/images/logos/test/robot-plane-2-dark.png" alt="2 Dark" class="img-fluid mb-3" style="max-height: 220px; object-fit: contain;">
        </div>
        <div class="card-body pt-0 text-center">
          <p class="mb-0 fw-bold fs-6" style="color: #fff;">2 Dark</p>
        </div>
      </div>
    </div>
    <div class="col-md-4 col-lg-3 mb-4">
      <div class="card h-100 border-0 shadow-sm" style="background: #fff; border-radius: 12px;">
        <div class="p-4 text-center">
          <img src="/assets/images/logos/test/robot-plane-3-minimal.png" alt="3 Minimal" class="img-fluid mb-3" style="max-height: 220px; object-fit: contain;">
        </div>
        <div class="card-body pt-0 text-center">
          <p class="mb-0 fw-bold fs-6" style="color: #1F2A2E;">3 Minimal</p>
        </div>
      </div>
    </div>
    <div class="col-md-4 col-lg-3 mb-4">
      <div class="card h-100 border-0 shadow-sm" style="background: #fff; border-radius: 12px;">
        <div class="p-4 text-center">
          <img src="/assets/images/logos/test/robot-plane-4-round.png" alt="4 Round" class="img-fluid mb-3" style="max-height: 220px; object-fit: contain;">
        </div>
        <div class="card-body pt-0 text-center">
          <p class="mb-0 fw-bold fs-6" style="color: #1F2A2E;">4 Round</p>
        </div>
      </div>
    </div>
    <div class="col-md-4 col-lg-3 mb-4">
      <div class="card h-100 border-0 shadow-sm" style="background: #fff; border-radius: 12px;">
        <div class="p-4 text-center">
          <img src="/assets/images/logos/test/robot-plane-8-tech.png" alt="8 Tech" class="img-fluid mb-3" style="max-height: 220px; object-fit: contain;">
        </div>
        <div class="card-body pt-0 text-center">
          <p class="mb-0 fw-bold fs-6" style="color: #1F2A2E;">8 Tech</p>
        </div>
      </div>
    </div>
    <div class="col-md-4 col-lg-3 mb-4">
      <div class="card h-100 border-0 shadow-sm" style="background: #1F2A2E; border-radius: 12px;">
        <div class="p-4 text-center">
          <img src="/assets/images/logos/test/robot-plane-9-badge-dark.png" alt="9 Badge Dark" class="img-fluid mb-3" style="max-height: 220px; object-fit: contain;">
        </div>
        <div class="card-body pt-0 text-center">
          <p class="mb-0 fw-bold fs-6" style="color: #fff;">9 Badge Dark</p>
        </div>
      </div>
    </div>
    <div class="col-md-4 col-lg-3 mb-4">
      <div class="card h-100 border-0 shadow-sm" style="background: #fff; border-radius: 12px;">
        <div class="p-4 text-center">
          <img src="/assets/images/logos/test/robot-plane-10-flying.png" alt="10 Flying" class="img-fluid mb-3" style="max-height: 220px; object-fit: contain;">
        </div>
        <div class="card-body pt-0 text-center">
          <p class="mb-0 fw-bold fs-6" style="color: #1F2A2E;">10 Flying</p>
