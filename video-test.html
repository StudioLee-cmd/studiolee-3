<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video Hover Test — Niche Labels</title>
  <style>
    body { margin: 0; background: #1F2A2E; padding: 40px; font-family: sans-serif; color: #fff; }
    h1 { text-align: center; margin-bottom: 40px; opacity: 0.7; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 24px; max-width: 1200px; margin: 0 auto; }
    .card { position: relative; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; cursor: pointer; }
    .card img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; transition: opacity 0.3s; }
    .card video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; opacity: 0; transition: opacity 0.3s; }
    .card:hover video { opacity: 1; }
    .card:hover img { opacity: 0; }
    .label { position: absolute; bottom: 12px; left: 12px; background: rgba(0,0,0,0.6); padding: 6px 14px; border-radius: 8px; font-size: 0.9rem; z-index: 2; }
  </style>
</head>
<body>
  <h1>Hover over the images to see the video animation</h1>
  <div class="grid">
    <div class="card" onmouseenter="this.querySelector('video').play()" onmouseleave="this.querySelector('video').pause();this.querySelector('video').currentTime=0">
      <img src="/assets/images/labels/kapperai.jpg" alt="KapperAI">
      <video muted loop preload="metadata" src="/assets/video/kapperai.mp4"></video>
      <span class="label">KapperAI</span>
    </div>
    <div class="card" onmouseenter="this.querySelector('video').play()" onmouseleave="this.querySelector('video').pause();this.querySelector('video').currentTime=0">
      <img src="/assets/images/labels/loodgieterai.jpg" alt="LoodgieterAI">
      <video muted loop preload="metadata" src="/assets/video/loodgieterai.mp4"></video>
      <span class="label">LoodgieterAI</span>
    </div>
    <div class="card" onmouseenter="this.querySelector('video').play()" onmouseleave="this.querySelector('video').pause();this.querySelector('video').currentTime=0">
      <img src="/assets/images/labels/elektroai.jpg" alt="ElektroAI">
      <video muted loop preload="metadata" src="/assets/video/elektroai.mp4"></video>
      <span class="label">ElektroAI</span>
    </div>
  </div>
</body>
</html>
